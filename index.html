<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vai de Click - Ofertas e Descontos Todos os Dias</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        vdc: {
                            snow: '#F4F6F8',      // Fundo cinza super claro para as cartas brancas saltarem
                            white: '#FFFFFF',     // Cartas
                            granite: '#111111',   // Textos principais
                            granitelight: '#4B5563', // Textos secundários
                            red: '#E62429',       // Vermelho destaque
                        }
                    },
                    animation: {
                        'float-1': 'float 4s ease-in-out infinite',
                        'float-2': 'float 5s ease-in-out infinite',
                        'float-3': 'float 4.5s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 2s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-6px)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 1 },
                            '50%': { opacity: 0.6 },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F4F6F8; /* Branco Neve texturizado */
            color: #111111; /* Preto Granito */
            /* Evita rolagem horizontal e otimiza visualização mobile */
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Cartão flutuante com sombra 3D realista */
        .floating-card {
            background-color: #FFFFFF;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }

        .floating-card:hover {
            transform: translateY(-4px) scale(1.02) !important;
            box-shadow: 0 20px 25px -5px rgba(230, 36, 41, 0.15), 0 10px 10px -5px rgba(230, 36, 41, 0.08);
            border-color: #E62429;
        }

        /* Animações desencontradas para parecerem balões flutuando */
        .delay-1 { animation-delay: 0s; }
        .delay-2 { animation-delay: 0.5s; }
        .delay-3 { animation-delay: 1s; }
        .delay-4 { animation-delay: 1.5s; }
        .delay-5 { animation-delay: 0.8s; }

        /* Ocultar barra de rolagem mas manter funcionalidade caso a tela seja muito pequena */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col items-center justify-center py-4 px-3 sm:px-4">

    <!-- Container super compacto -->
    <main class="w-full max-w-md mx-auto flex flex-col gap-4">
        
        <!-- Header Compacto -->
        <header class="flex flex-col items-center text-center">
            <!-- Logo menor para economizar espaço -->
            <div class="relative w-24 h-24 mb-2">
                <div class="absolute inset-0 bg-vdc-red rounded-[2rem] blur-md opacity-30 animate-pulse-glow"></div>
                <img src="logo.jpeg" alt="Vai de Click Logo" class="relative w-full h-full rounded-[1.8rem] object-cover border-2 border-white shadow-lg bg-white">
            </div>

            <!-- Título compacto -->
            <h1 class="text-3xl font-heading font-black text-vdc-granite tracking-tight leading-tight">

            <p class="text-xs text-vdc-granitelight font-medium mt-1 mb-3">As melhores ofertas todos os dias! 💸</p>

            <!-- Botão Insta Ultra Compacto -->

                <i class="fa-brands fa-instagram text-lg"></i>

        </header>

        <!-- Grade de Grupos (Grid 2 colunas para caber tudo na tela) -->

                    <span class="w-8 h-px bg-gray-300"></span>
                </h2>
            </div>

            <!-- Grid: 2 colunas. O último item ocupa as 2 colunas -->
            <div class="grid grid-cols-2 gap-3">
                
                <!-- Eletrônicos -->
                <a href="https://chat.whatsapp.com/LsBOhJUu09UG7BlNX1GhSZ" target="_blank" class="floating-card animate-float-1 delay-1 flex flex-col items-center text-center p-3 group relative overflow-hidden">
                    <i class="fa-solid fa-laptop text-2xl text-vdc-granite mb-1 group-hover:text-vdc-red transition-colors"></i>
                    <span class="font-bold text-vdc-granite text-xs mb-2">Eletrônicos</span>
                    <!-- Botão de Ação Destaque -->
                    <div class="w-full bg-vdc-red text-white text-[10px] font-bold uppercase py-1.5 rounded-lg shadow-sm">
                        Entrar <i class="fa-solid fa-arrow-right ml-1"></i>
                    </div>
                </a>

                <!-- Casa e Decoração -->
                <a href="https://chat.whatsapp.com/H1V5sXKL4Ji0a93yAvAuZ7" target="_blank" class="floating-card animate-float-2 delay-2 flex flex-col items-center text-center p-3 group relative overflow-hidden">
                    <i class="fa-solid fa-house text-2xl text-vdc-granite mb-1 group-hover:text-vdc-red transition-colors"></i>
                    <span class="font-bold text-vdc-granite text-xs mb-2">Casa & Decor</span>
                    <div class="w-full bg-vdc-red text-white text-[10px] font-bold uppercase py-1.5 rounded-lg shadow-sm">
                        Entrar <i class="fa-solid fa-arrow-right ml-1"></i>
                    </div>
                </a>

                <!-- Moda -->
                <a href="https://chat.whatsapp.com/Ea3wnpLDL7GL4XDZZticoa" target="_blank" class="floating-card animate-float-3 delay-3 flex flex-col items-center text-center p-3 group relative overflow-hidden">
                    <i class="fa-solid fa-shirt text-2xl text-vdc-granite mb-1 group-hover:text-vdc-red transition-colors"></i>

                    </div>
                </a>

                <!-- Calçados -->
                <a href="https://chat.whatsapp.com/HMocwTuu24jFri5qwUeixT" target="_blank" class="floating-card animate-float-1 delay-4 flex flex-col items-center text-center p-3 group relative overflow-hidden">
                    <i class="fa-solid fa-shoe-prints text-2xl text-vdc-granite mb-1 group-hover:text-vdc-red transition-colors"></i>
                    <span class="font-bold text-vdc-granite text-xs mb-2">Calçados</span>
                    <div class="w-full bg-vdc-red text-white text-[10px] font-bold uppercase py-1.5 rounded-lg shadow-sm">

                <!-- Pets (Centralizado com o mesmo tamanho dos outros) -->

                    <a href="https://chat.whatsapp.com/JQUj9ixaXBa4i71fm5Wbnq" target="_blank" class="w-[calc(50%-6px)] floating-card animate-float-2 delay-5 flex flex-col items-center text-center p-3 group relative overflow-hidden">
                        <i class="fa-solid fa-paw text-2xl text-vdc-granite mb-1 group-hover:text-vdc-red transition-colors"></i>

                        <div class="w-full bg-vdc-red text-white text-[10px] font-bold uppercase py-1.5 rounded-lg shadow-sm">

                        </div>
                    </a>
                </div>

            </div>
        </section>

        <!-- Seção das Lojas (Menu Retrátil / Dropdown) -->
        <section class="w-full mt-1 mb-6">
            <!-- Botão Principal que abre o Menu -->
            <button onclick="toggleStores()" class="relative w-full bg-vdc-granite rounded-2xl p-4 overflow-hidden group shadow-xl hover:shadow-2xl transition-all cursor-pointer text-left">
                <!-- Brilho vermelho de fundo no hover -->
                <div class="absolute inset-0 bg-gradient-to-r from-vdc-red/0 via-vdc-red/20 to-vdc-red/0 transform -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
                
                <div class="relative z-10 flex items-center justify-between">
                    <div class="flex items-center gap-4">

                            <i class="fa-solid fa-cart-shopping"></i>
                        </div>
                        <div>
                            <h2 class="text-white font-heading font-black text-lg uppercase leading-tight">Nossas Lojas</h2>
                            <p class="text-gray-400 text-[11px] font-medium mt-0.5">Toque para ver os catálogos</p>
                        </div>
                    </div>
                    
                    <!-- Ícone de seta que vai girar -->
                    <div id="storeChevron" class="bg-white text-vdc-granite w-10 h-10 min-w-[2.5rem] rounded-full flex items-center justify-center group-hover:bg-vdc-red group-hover:text-white transition-colors shadow-md">

                    </div>
                </div>
            </button>

            <!-- Lista de Lojas Escondida (Abre ao Clicar) -->
            <div id="storeList" class="hidden flex-col gap-2 mt-3">
                <!-- Eletrônicos -->
                <a href="https://tech.vaideclick.com/" target="_blank" class="flex items-center justify-between p-3 bg-white rounded-xl shadow-sm border border-gray-100 hover:border-vdc-red group transition-all">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-laptop text-vdc-granite w-5 text-center group-hover:text-vdc-red transition-colors"></i>
                        <span class="font-bold text-vdc-granite text-sm">Eletrônicos & Informática</span>
                    </div>
                    <i class="fa-solid fa-arrow-right text-xs text-gray-300 group-hover:text-vdc-red"></i>
                </a>
                
                <!-- Moda -->
                <a href="https://moda.vaideclick.com/" target="_blank" class="flex items-center justify-between p-3 bg-white rounded-xl shadow-sm border border-gray-100 hover:border-vdc-red group transition-all">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-shirt text-vdc-granite w-5 text-center group-hover:text-vdc-red transition-colors"></i>
                        <span class="font-bold text-vdc-granite text-sm">Modas</span>
                    </div>
                    <i class="fa-solid fa-arrow-right text-xs text-gray-300 group-hover:text-vdc-red"></i>
                </a>

                <!-- Calçados -->
                <a href="https://calcados.vaideclick.com/" target="_blank" class="flex items-center justify-between p-3 bg-white rounded-xl shadow-sm border border-gray-100 hover:border-vdc-red group transition-all">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-shoe-prints text-vdc-granite w-5 text-center group-hover:text-vdc-red transition-colors"></i>
                        <span class="font-bold text-vdc-granite text-sm">Calçados (Fem/Masc)</span>
                    </div>
                    <i class="fa-solid fa-arrow-right text-xs text-gray-300 group-hover:text-vdc-red"></i>
                </a>

                <!-- Casa e Decoração -->
                <a href="https://casa.vaideclick.com/" target="_blank" class="flex items-center justify-between p-3 bg-white rounded-xl shadow-sm border border-gray-100 hover:border-vdc-red group transition-all">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-house text-vdc-granite w-5 text-center group-hover:text-vdc-red transition-colors"></i>
                        <span class="font-bold text-vdc-granite text-sm">Casa & Decoração</span>

                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-paw text-vdc-granite w-5 text-center group-hover:text-vdc-red transition-colors"></i>
                        <span class="font-bold text-vdc-granite text-sm">Mundo Pet</span>

                    <i class="fa-solid fa-arrow-right text-xs text-gray-300 group-hover:text-vdc-red"></i>
                </a>
            </div>
        </section>

    </main>

    <!-- Script para criar o Efeito de Abrir/Fechar nas Lojas -->
    <script>
        function toggleStores() {
            const list = document.getElementById('storeList');
            const chevron = document.querySelector('#storeChevron i');
            
            if (list.classList.contains('hidden')) {
                // Abre o menu
                list.classList.remove('hidden');
                list.classList.add('flex');
                chevron.classList.add('rotate-180');
            } else {
                // Fecha o menu
                list.classList.add('hidden');
                list.classList.remove('flex');
                chevron.classList.remove('rotate-180');
            }
        }
    </script>
</body>
</html>
